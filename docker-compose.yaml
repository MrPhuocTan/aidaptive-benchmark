services:

  postgres:
    image: postgres:16-alpine
    container_name: aidaptive-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=aidaptive
      - POSTGRES_PASSWORD=aidaptive2024
      - POSTGRES_DB=aidaptive_benchmark
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidaptive"]
      interval: 5s
      timeout: 5s
      retries: 5





volumes:
  postgres_data:
